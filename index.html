<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO SPORTS | LIVE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/53/53283.png">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #161616; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 800px; text-align: center; }
        .video-js { width: 100%; border-radius: 10px; overflow: hidden; background-color: #000; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .btn-reload { background: #33cc33; color: white; }
        .btn-report { background: #ff3333; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="status-text">MAESTRO DE FÚTBOL</h2>
        <video id="mi-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline>
            <source id="fuente-video" src="" type="application/x-mpegURL">
        </video>
        <div class="controls">
            <button class="btn-reload" onclick="recargarVideo()">🔄 RECARGAR</button>
            <button class="btn-report" onclick="reportarCanal()">⚠️ REPORTAR FALLA</button>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        const player = videojs('mi-video', {
            html5: {
                hls: {
                    overrideNative: true,
                    smoothQualityChange: true,
                    enableLowInitialPlaylist: true
                }
            }
        });

        // Lógica unificada de carga
        fetch('canales.json')
            .then(response => response.json())
            .then(data => {
                let urlVideo = "";

                // Prioridad 1: Canal principal
                if (data.principal) {
                    urlVideo = data.principal;
                } 
                // Prioridad 2: Respaldo
                else if (data.respaldo) {
                    urlVideo = data.respaldo;
                }
                // Prioridad 3: Primera fuente del arreglo
                else if (data.fuentes_json && data.fuentes_json.length > 0) {
                    urlVideo = data.fuentes_json[0];
                }

                if (urlVideo) {
                    player.src({ src: urlVideo, type: 'application/x-mpegURL' });
                    document.getElementById('status-text').innerText = "TRANSMITIENDO EN VIVO";
                    player.play();
                } else {
                    document.getElementById('status-text').innerText = "NO HAY FUENTES DISPONIBLES";
                }
            })
            .catch(err => {
                console.error("Error:", err);
                document.getElementById('status-text').innerText = "ERROR AL CONECTAR";
            });

        // Fallback automático si falla el video
        player.on('error', () => {
            fetch('canales.json').then(r => r.json()).then(data => {
                if (data.respaldo) {
                    player.src({ src: data.respaldo, type: 'application/x-mpegURL' });
                    player.play();
                }
            });
        });

        function recargarVideo() {
            player.src(player.src());
            player.play();
        }

        function reportarCanal() {
            // Asegúrate de cambiar TU_USUARIO por tu ID real
            window.open(`https://t.me/TU_USUARIO?text=Falla en: ${encodeURIComponent(window.location.href)}`, '_blank');
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
